services:
  # ===========================================
  # Infrastructure
  # ===========================================

  postgres:
    image: postgres:16-alpine
    container_name: sbudget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sbudget
      POSTGRES_PASSWORD: sbudget_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sbudget" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbudget-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: sbudget-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: sbudget
      RABBITMQ_DEFAULT_PASS: sbudget_pass
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sbudget-network

  # ===========================================
  # Microservices
  # ===========================================

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: sbudget-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sbudget-network

  auth-service:
    build:
      context: .
      dockerfile: apps/auth-service/Dockerfile
    container_name: sbudget-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sbudget-network

  transaction-service:
    build:
      context: .
      dockerfile: apps/transaction-service/Dockerfile
    container_name: sbudget-transaction-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sbudget-network

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    container_name: sbudget-ai-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - .env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - sbudget-network

  insight-service:
    build:
      context: .
      dockerfile: apps/insight-service/Dockerfile
    container_name: sbudget-insight-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - sbudget-network

volumes:
  postgres_data:
  rabbitmq_data:


networks:
  sbudget-network:
    driver: bridge
